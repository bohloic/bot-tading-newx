version: '3.8'

services:
  # Le moteur de Trading IA (FastAPI)
  trading-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
    restart: always

  # Le bouclier réseau (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - trading-api
    restart: always
